<div class="auth-page">
  <div class="fade-in-up" style="width: 100%; max-width: 420px;">

    <!-- Heading -->
    <div style="text-align: center; margin-bottom: 1.5rem;">
      <div style="display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
        <span style="font-size: 1.25rem; font-weight: 700; color: var(--text);">Authify</span>
      </div>
      <p style="font-size: 0.9375rem; color: var(--text-muted);">Sign in or create an account</p>
    </div>

    <!-- Card -->
    <div class="form-card">

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn" [class.active]="activeTab() === 'login'" [class.inactive]="activeTab() !== 'login'"
          (click)="switchTab('login')">Sign In</button>
        <button class="tab-btn" [class.active]="activeTab() === 'register'"
          [class.inactive]="activeTab() !== 'register'" (click)="switchTab('register')">Register</button>
      </div>

      <!-- Alerts -->
      @if (error()) {
      <div class="alert-error fade-in" style="margin-bottom: 1rem;">{{ error() }}</div>
      }
      @if (success()) {
      <div class="alert-success fade-in" style="margin-bottom: 1rem;">{{ success() }}</div>
      }

      <!-- ── LOGIN FORM ── -->
      @if (activeTab() === 'login') {
      <form (ngSubmit)="onLogin()" class="fade-in" style="display: flex; flex-direction: column; gap: 1rem;">
        <div>
          <label class="form-label" for="login-email">Email</label>
          <input id="login-email" type="email" class="input-field" placeholder="you@example.com"
            [(ngModel)]="loginEmail" name="loginEmail" />
        </div>
        <div>
          <label class="form-label" for="login-password">Password</label>
          <input id="login-password" type="password" class="input-field" placeholder="••••••••"
            [(ngModel)]="loginPassword" name="loginPassword" />
        </div>

        <div style="text-align: right; margin-top: -0.25rem;">
          <a routerLink="/forgot-password" class="link-btn" style="font-size: 0.8125rem;">Forgot password?</a>
        </div>

        <button id="login-submit" type="submit" class="btn-primary w-full" [disabled]="loading()">
          @if (loading()) { <span class="spinner"></span> Loading... } @else { Sign In }
        </button>
      </form>
      }

      <!-- ── REGISTER FORM ── -->
      @if (activeTab() === 'register') {
      <form (ngSubmit)="onRegister()" class="fade-in" style="display: flex; flex-direction: column; gap: 1rem;">
        <div>
          <label class="form-label" for="reg-name">Full Name</label>
          <input id="reg-name" type="text" class="input-field" placeholder="John Doe" [(ngModel)]="regName"
            name="regName" />
        </div>
        <div>
          <label class="form-label" for="reg-email">Email</label>
          <input id="reg-email" type="email" class="input-field" placeholder="you@example.com" [(ngModel)]="regEmail"
            name="regEmail" />
        </div>
        <div>
          <label class="form-label" for="reg-password">Password</label>
          <input id="reg-password" type="password" class="input-field" placeholder="Min. 8 characters"
            [(ngModel)]="regPassword" name="regPassword" />
        </div>
        <div>
          <label class="form-label" for="reg-role">Role</label>
          <select id="reg-role" class="select-field" [(ngModel)]="regRole" name="regRole">
            <option value="ROLE_USER">Student (USER)</option>
            <option value="ROLE_TEACHER">Teacher (TEACHER)</option>
            <option value="ROLE_ADMIN">Admin (ADMIN)</option>
          </select>
        </div>

        <button id="register-submit" type="submit" class="btn-primary w-full" [disabled]="loading()">
          @if (loading()) { <span class="spinner"></span> Loading... } @else { Create Account }
        </button>
      </form>
      }

    </div>

    <p style="text-align: center; font-size: 0.8125rem; color: var(--text-light); margin-top: 1.25rem;">
      By continuing you agree to our Terms of Service
    </p>
  </div>
</div>
