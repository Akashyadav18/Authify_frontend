<div class="gradient-bg min-h-screen flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md fade-in-up">

    <!-- Icon -->
    <div class="text-center mb-8">
      <div class="inline-flex w-16 h-16 rounded-2xl items-center justify-center mb-4"
           style="background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2)); border:1px solid rgba(99,102,241,0.3);">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Reset Password</h1>
      <p class="text-sm mt-1" style="color:#64748b;">
        Enter the OTP sent to <span style="color:#a5b4fc;">{{ email }}</span>
      </p>
    </div>

    <div class="glass-card p-8">
      @if (error()) {
        <div class="alert-error mb-6 fade-in">{{ error() }}</div>
      }

      <form (ngSubmit)="resetPassword()" class="space-y-6">
        <!-- OTP -->
        <div>
          <label class="form-label mb-3">6-Digit OTP</label>
          <div class="flex justify-center">
            <app-otp-input (otpComplete)="onOtpComplete($event)" />
          </div>
        </div>

        <hr />

        <!-- New Password -->
        <div>
          <label class="form-label">New Password</label>
          <input id="new-password" type="password" class="input-field"
                 placeholder="Enter new password"
                 [(ngModel)]="newPassword" name="newPassword" />
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="form-label">Confirm Password</label>
          <input id="confirm-password" type="password" class="input-field"
                 placeholder="Repeat new password"
                 [(ngModel)]="confirmPassword" name="confirmPassword" />
        </div>

        <button id="reset-password-submit" type="submit" class="btn-primary" [disabled]="loading()">
          @if (loading()) { <span class="spinner"></span> } Reset Password
        </button>
      </form>

    </div>

  </div>
</div>
