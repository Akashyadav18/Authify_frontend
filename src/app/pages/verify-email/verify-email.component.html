<div class="auth-page">
  <div class="fade-in-up" style="width: 100%; max-width: 420px;">

    <h1 class="auth-heading">Verify Your Email</h1>
    <p class="auth-subheading">We've sent a 6-digit OTP to your email. Enter it below.</p>

    <div class="form-card">

      @if (error()) {
        <div class="alert-error fade-in" style="margin-bottom: 1rem;">{{ error() }}</div>
      }
      @if (success()) {
        <div class="alert-success fade-in" style="margin-bottom: 1rem;">{{ success() }}</div>
      }

      <!-- OTP boxes -->
      <div style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
        <app-otp-input (otpComplete)="onOtpComplete($event)" />
      </div>

      <!-- Verify button -->
      <button id="verify-email-submit" class="btn-primary w-full" (click)="verify()" [disabled]="loading()">
        @if (loading()) { <span class="spinner"></span> Loading... } @else { Verify Email }
      </button>

      <!-- Resend -->
      <div style="text-align: center; margin-top: 1.25rem;">
        <span style="font-size: 0.875rem; color: var(--text-muted);">Didn't receive the code?</span>
        <button class="link-btn" style="margin-left: 0.375rem;" (click)="resendOtp()" [disabled]="resending()">
          @if (resending()) { Sending... } @else { Resend OTP }
        </button>
      </div>

    </div>
  </div>
</div>
